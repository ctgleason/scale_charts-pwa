<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scale Charts" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Scale Charts PWA</title>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>Scale Charts</h1>
        <p>Choose a chord and CAGED voicing</p>
        <p id="app-version" class="app-version" aria-live="polite"></p>
        <div class="header-actions">
          <button id="progression-menu-toggle" type="button" class="menu-toggle" aria-expanded="false" aria-controls="progression-panel">
            Progressions
          </button>
        </div>
      </header>

      <section id="progression-panel" class="panel progression-panel is-hidden" aria-label="Progression manager" hidden>
        <div class="panel-heading-row">
          <h2>Progressions</h2>
          <button id="progression-close" type="button" class="ghost-btn">Close</button>
        </div>

        <div class="progression-grid">
          <section class="progression-library" aria-label="Saved progressions">
            <div class="panel-subheading-row">
              <h3>Library</h3>
              <div class="editor-actions">
                <button id="progression-export" type="button" class="ghost-btn">Export</button>
                <button id="progression-import" type="button" class="ghost-btn">Import</button>
                <button id="progression-new" type="button" class="ghost-btn">New</button>
              </div>
            </div>
            <div id="progression-list" class="progression-list"></div>
            <input id="progression-import-file" type="file" accept="application/json,.json" hidden />
          </section>

          <section class="progression-editor" aria-label="Progression editor">
            <div class="panel-subheading-row">
              <h3>Editor</h3>
              <div class="editor-actions">
                <button id="progression-save" type="button" class="ghost-btn">Save</button>
                <button id="progression-delete" type="button" class="ghost-btn danger-btn">Delete</button>
              </div>
            </div>

            <div class="controls-grid progression-meta-grid">
              <label class="control-field">
                <span>Name</span>
                <input id="progression-name" type="text" placeholder="My progression" />
              </label>

              <label class="control-field">
                <span>Key root</span>
                <select id="progression-root-note">
                  <option>A</option>
                  <option>B</option>
                  <option>C</option>
                  <option>D</option>
                  <option>E</option>
                  <option>F</option>
                  <option>G</option>
                </select>
              </label>

              <label class="control-field">
                <span>Accidental</span>
                <select id="progression-accidental">
                  <option value="">Natural</option>
                  <option value="#">Sharp (#)</option>
                  <option value="b">Flat (b)</option>
                </select>
              </label>

              <label class="control-field">
                <span>Key quality</span>
                <select id="progression-quality">
                  <option value="major">Major</option>
                  <option value="minor">Minor</option>
                </select>
              </label>

              <label class="control-field">
                <span>Tempo</span>
                <input id="progression-tempo" type="number" min="30" max="240" step="1" value="100" />
              </label>

              <label class="control-field">
                <span>Count-in beats</span>
                <input id="progression-count-in" type="number" min="0" max="8" step="1" value="4" />
              </label>

              <label class="control-field">
                <span>Preview lead</span>
                <select id="progression-preview-lead">
                  <option value="none">None</option>
                  <option value="eighth">Eighth note</option>
                  <option value="quarter">Quarter note</option>
                  <option value="half">Half note</option>
                </select>
              </label>
            </div>

            <div class="panel-subheading-row progression-steps-heading">
              <h3>Chord steps</h3>
              <button id="progression-add-step" type="button" class="ghost-btn">Add step</button>
            </div>
            <div id="progression-steps" class="progression-steps"></div>
          </section>
        </div>
      </section>

      <section class="panel">
        <h2>Chord Options</h2>
        <div class="controls-grid">
          <label class="control-field">
            <span>Root</span>
            <select id="root-note">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
              <option>E</option>
              <option>F</option>
              <option>G</option>
            </select>
          </label>

          <label class="control-field">
            <span>Accidental</span>
            <select id="accidental">
              <option value="">Natural</option>
              <option value="#">Sharp (#)</option>
              <option value="b">Flat (b)</option>
            </select>
          </label>

          <label class="control-field">
            <span>Quality</span>
            <select id="quality">
              <option value="major">Major</option>
              <option value="minor">Minor</option>
            </select>
          </label>
        </div>

        <div class="caged-row" aria-label="CAGED voicing selector">
          <span class="caged-label">Voicing</span>
          <div id="caged-buttons" class="caged-buttons" role="group" aria-label="CAGED voicing">
            <button type="button" class="caged-btn is-active" data-voicing="C">C</button>
            <button type="button" class="caged-btn" data-voicing="A">A</button>
            <button type="button" class="caged-btn" data-voicing="G">G</button>
            <button type="button" class="caged-btn" data-voicing="E">E</button>
            <button type="button" class="caged-btn" data-voicing="D">D</button>
          </div>
        </div>

        <div class="caged-row" aria-label="Scale degree chord selector">
          <span class="caged-label">Degree</span>
          <div id="degree-buttons" class="caged-buttons" role="group" aria-label="Degree chord">
            <button type="button" class="caged-btn is-active" data-degree="1">I</button>
            <button type="button" class="caged-btn" data-degree="2">II</button>
            <button type="button" class="caged-btn" data-degree="3">III</button>
            <button type="button" class="caged-btn" data-degree="4">IV</button>
            <button type="button" class="caged-btn" data-degree="5">V</button>
            <button type="button" class="caged-btn" data-degree="6">VI</button>
            <button type="button" class="caged-btn" data-degree="7">VII</button>
          </div>
        </div>

        <div class="overlay-row" aria-label="Overlay selector">
          <span class="caged-label">Overlays</span>
          <div id="overlay-options" class="overlay-options"></div>
        </div>
      </section>

      <section class="panel">
        <h2 id="selection-title">A Major · C voicing</h2>
        <div class="chart-stack">
          <div id="main-chart" class="chart"></div>
          <div id="preview-chart" class="chart chart-preview-layer" aria-hidden="true"></div>
        </div>
      </section>

      <section class="panel progression-transport-panel" aria-label="Progression transport">
        <div class="progression-transport-header">
          <h3>Transport</h3>
          <p id="progression-transport-status" class="progression-transport-status">Stopped</p>
        </div>
        <div class="progression-transport-controls">
          <button id="progression-play-pause" type="button" class="transport-btn" title="Play" aria-label="Play">▶</button>
          <button id="progression-prev-step" type="button" class="transport-btn" title="Previous step" aria-label="Previous step">⏮</button>
          <button id="progression-stop" type="button" class="transport-btn" title="Stop" aria-label="Stop">⏹</button>
          <button id="progression-next-step" type="button" class="transport-btn" title="Next step" aria-label="Next step">⏭</button>
          <button id="progression-test-tone" type="button" class="transport-btn transport-test-btn" title="Test audio" aria-label="Test audio">🔊</button>
          <div class="transport-tempo-control">
            <input id="transport-tempo" type="range" min="30" max="240" step="1" value="100" />
            <span id="transport-tempo-display" class="transport-tempo-display">100 BPM</span>
          </div>
        </div>
      </section>
    </main>

    <script src="./vendor/svguitar.umd.js"></script>
    <script defer src="./app.js"></script>
  </body>
</html>
