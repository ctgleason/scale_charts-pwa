<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scale Charts" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Scale Charts PWA</title>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>Scale Charts</h1>
        <p>Choose a chord and CAGED voicing</p>
      </header>

      <section class="panel">
        <h2>Chord Options</h2>
        <div class="controls-grid">
          <label class="control-field">
            <span>Template</span>
            <select id="template-pattern"></select>
          </label>

          <label class="control-field">
            <span>Root</span>
            <select id="root-note">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
              <option>E</option>
              <option>F</option>
              <option>G</option>
            </select>
          </label>

          <label class="control-field">
            <span>Accidental</span>
            <select id="accidental">
              <option value="">Natural</option>
              <option value="#">Sharp (#)</option>
              <option value="b">Flat (b)</option>
            </select>
          </label>

          <label class="control-field">
            <span>Quality</span>
            <select id="quality">
              <option value="major">Major</option>
              <option value="minor">Minor</option>
            </select>
          </label>
        </div>

        <div class="caged-row" aria-label="CAGED voicing selector">
          <span class="caged-label">Voicing</span>
          <div id="caged-buttons" class="caged-buttons" role="group" aria-label="CAGED voicing">
            <button type="button" class="caged-btn is-active" data-voicing="C">C</button>
            <button type="button" class="caged-btn" data-voicing="A">A</button>
            <button type="button" class="caged-btn" data-voicing="G">G</button>
            <button type="button" class="caged-btn" data-voicing="E">E</button>
            <button type="button" class="caged-btn" data-voicing="D">D</button>
          </div>
        </div>

        <div class="overlay-row" aria-label="Overlay selector">
          <span class="caged-label">Overlays</span>
          <div id="overlay-options" class="overlay-options"></div>
        </div>
      </section>

      <section class="panel">
        <h2 id="selection-title">A Major · C voicing</h2>
        <div id="main-chart" class="chart"></div>
      </section>
    </main>

    <script src="./vendor/svguitar.umd.js"></script>
    <script defer src="./app.js"></script>
  </body>
</html>
